services:
  tower-optimizer:
    image: ghcr.io/tankietank/the-tower-optimizer:latest
    pull_policy: always
    container_name: tower-optimizer
    restart: unless-stopped
    labels:
      net.unraid.docker.webui: "http://[IP]:[PORT:8501]/"
      net.unraid.docker.icon: "https://raw.githubusercontent.com/Tankietank/The-Tower-Optimizer/main/assets/brand/tower_optimizer.svg"
    ports:
      - "${TOWER_OPTIMIZER_PORT:-8501}:8501"
    environment:
      TOWER_OPTIMIZER_DATA_DIR: /app/data
    volumes:
      - ${TOWER_OPTIMIZER_DATA_PATH:-./data}:/app/data
