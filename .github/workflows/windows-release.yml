name: Build Windows executable

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Create virtual environment and install
        shell: pwsh
        run: |
          python -m venv .venv
          .\.venv\Scripts\python.exe -m pip install --upgrade pip
          .\.venv\Scripts\pip.exe install -e ".[dev]"

      - name: Build portable Windows zip
        shell: pwsh
        run: .\scripts\build_windows_exe.ps1

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: TowerOptimizer-Windows
          path: dist/TowerOptimizer-*.zip
          if-no-files-found: error

      - name: Publish GitHub Release (tag builds only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/TowerOptimizer-*.zip
          prerelease: true
          generate_release_notes: true
