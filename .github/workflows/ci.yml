name: Continuous integration

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Compile
        run: python -m compileall -q app.py tower_optimizer tools tests scripts
      - name: Public release audit
        run: python tools/public_release_audit.py
      - name: Engine smoke test
        run: python tools/smoke_test.py
      - name: Visual preview validation
        run: python tools/v2_preview_validation.py
      - name: Unit tests
        run: pytest -q
